$schema: 'https://git.drupalcode.org/project/sdc/-/raw/1.x/src/metadata.schema.json'
name: 'FinTech Stats Counter'
status: stable
description: >
  Single statistic counter with an icon, a bold number/value, and a label.
  Used in the Statistics section placed in a 4-column row to show key platform
  metrics: e.g. "60% Faster Payments", "10,000+ Businesses Served",
  "99.9% Uptime", "24/7 Support". Inherited from the site_page_builder module.
category: FinTech
group: site_page_builder_counter_item
props:
  type: object
  properties:
    icon:
      type: string
      title: 'Icon CSS Class'
      description: 'Font Awesome 6 class string.'
      examples:
        - 'fa-solid fa-rocket'
        - 'fa-solid fa-building'
        - 'fa-solid fa-circle-check'
        - 'fa-solid fa-headset'
    number:
      type: string
      title: 'Number / Value'
      description: 'The metric value, including suffix if needed.'
      examples:
        - '60%'
        - '10,000+'
        - '99.9%'
        - '24/7'
    counter_label:
      type: string
      title: 'Label'
      description: 'Short description of the metric.'
      examples:
        - 'Faster Payments'
        - 'Businesses Served'
        - 'Uptime SLA'
        - 'Support'
